<!doctype html>
<html>
  <head>
    <title>Ultra Cookie Clicker</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>🍪 ULTRA COOKIE CLICKER 🍪</h1>

    <div class="stats">
      <h2>
        Cookies:
        <span id="cookies">0</span>
      </h2>

      <h3>
        Combo:
        <span id="combo">0</span>
      </h3>
    </div>

    <div id="game">
      <div id="cookie">🍪</div>

      <div id="numbers"></div>

      <button id="upgrade">
        Upgrade Oven 🔥
        <br />
        Cost: <span id="cost">50</span>
      </button>
    </div>

    <canvas id="fx"></canvas>

    <script src="script.js"></script>
  </body>
</html>
